server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ESM (.mjs) y WASM necesitan el MIME correcto o el navegador los rechaza.
    location ~* \.mjs$  { default_type text/javascript; add_header Cache-Control "public, max-age=31536000, immutable"; }
    location ~* \.wasm$ { default_type application/wasm;  add_header Cache-Control "public, max-age=31536000, immutable"; }
    # El modelo (.onnx) y demás assets: cacheo agresivo (son inmutables por versión).
    location ~* \.onnx$ { default_type application/octet-stream; add_header Cache-Control "public, max-age=31536000, immutable"; }

    location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }
    location /models/ { add_header Cache-Control "public, max-age=31536000, immutable"; }

    location / { try_files $uri $uri/ =404; }
}
